<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV12 GUDAUTA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0b12;
    color: #fff;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    background: #0f111a;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

header img {
    width: 40px;
    margin-right: 10px;
}

header h1 {
    font-size: 18px;
    margin: 0;
}

/* PLAYER */
.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 15px;
	box-shadow: 0 24px 60px rgba(0, 0, 0, .8), 0 0 0 1px rgba(255, 255, 255, .04);
}

.player-box {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;

    box-shadow: 0 24px 60px rgba(0, 0, 0, .8), 
                0 0 0 1px rgba(255, 255, 255, .04);
}

/* CHANNEL BUTTONS */
.channels {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.channel {
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.2s;
    border: 2px solid transparent;
}

.channel img {
    width: 90px;
    display: block;
}

.channel:hover {
    transform: scale(1.05);
}

.channel.active {
    border: 2px solid #4da6ff;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    margin-top: 40px;
    font-size: 13px;
    color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
    header h1 {
        font-size: 16px;
    }

    .channel img {
        width: 70px;
    }
}
</style>
</head>

<body>

<header>
    <img src="https://ritsatv.ru//files/poster/original/900776.webp">
    <h1>TV12 GUDAUTA</h1>
</header>

<div class="container">

    <div class="player-box">
        <div id="player" style="width:100%;height:100%;"></div>
    </div>

    <div class="channels">
        <div class="channel active" onclick="setChannel(0,this)">
            <img src="https://ritsatv.ru//files/poster/original/900776.webp">
        </div>

        <div class="channel" onclick="setChannel(1,this)">
            <img src="https://ritsatv.ru//files/poster/original/901573.webp">
        </div>

        <div class="channel" onclick="setChannel(2,this)">
            <img src="https://ritsatv.ru//files/poster/original/901235.webp">
        </div>
    </div>

</div>

<footer>
    © 2026  
</footer>

<script src='https://ritsatv.ru/PLAYER/playerjs19KINOZAL.js'></script>

<script>
let player;

const channels = [
{
    file: "[240p]https://ritsatv.ru/vlive2/mafi2atv/240,[360p]https://ritsatv.ru/vlive2/mafi2atv/360,[480p]https://ritsatv.ru/vlive2/mafi2atv/480,[720p]https://ritsatv.ru/vlive2/mafi2atv/720,[1080p]https://ritsatv.ru/vlive2/mafi2atv/1080",
    title: "TV12 GUDAUTA",
    poster: "https://ritsatv.ru//files/poster/original/900776"
},
{
    file: "https://amg01131-tracetv-tracelatina-glewed-vtnk7.amagi.tv/playlist1080P.m3u8",
    title: "TRACE LATINA",
    poster: "https://ritsatv.ru//files/poster/original/901573"
},
{
    file: "https://amg01131-tracetv-amg01131c5-plex-us-4388.playouts.now.amagi.tv/playlist1080p.m3u8",
    title: "TRACE UK",
    poster: "https://ritsatv.ru//files/poster/original/901235"
}
];

function initPlayer(channelIndex = 0) {
    if (player) {
        player.api("stop");
        document.getElementById("player").innerHTML = "";
    }

    player = new Playerjs({
        id: "player",
        file: channels[channelIndex].file,
        poster: channels[channelIndex].poster,
        title: channels[channelIndex].title
    });
}

function setChannel(index, el) {
    document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    initPlayer(index);
}

initPlayer();
</script>

</body>
</html>
